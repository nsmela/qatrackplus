<style>
:root {
  --primary: #424f57;
  --primary-2: #323e46;
  --al-blue: #3c8dbc;
  --al-green: #00a65a;
  --al-yellow: #f39c12;
  --al-red: #dd4b39;
  --al-gray: #d2d6de;
  --body-bg: #ecf0f5;
  --text: #333;
  --muted: #777;
  --line: #d2d6de;
  --line-soft: #f4f4f4;
  --warn-hint: #b6893b;
}

.details-card, .results-card, #changelist-filter {
  font-family: 'Source Sans Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  color: var(--text);
}

.testlist-top-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.testlist-top-buttons {
  display: flex;
  gap: 10px;
}

/* --- Change List (Index) --- */
#changelist {
  display: grid;
  grid-template-columns: 1fr 248px;
  grid-template-areas: "results filter";
  gap: 16px;
  align-items: start;
}
#changelist form#changelist-form {
  grid-area: results;
}

#changelist-filter {
  grid-area: filter;
  position: sticky;
  top: 16px;
  margin: 0;
  background: #fff;
  border-top: 3px solid var(--primary);
  box-shadow: 0 1px 1px rgba(0,0,0,.1);
}
#changelist-filter h2 {
  padding: 10px 12px !important;
  border-bottom: 1px solid var(--line-soft) !important;
  font-size: 17px !important;
  font-weight: 600 !important;
  color: #444 !important;
  margin: 0 !important;
  background: transparent !important;
}
#changelist-filter h3 {
  font-size: 11px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: .03em !important;
  color: #8a929e !important;
  margin: 12px 12px 8px !important;
  background: transparent !important;
  border: none !important;
  padding: 0 !important;
}
#changelist-filter ul {
  padding: 0 12px;
  margin-bottom: 12px;
}
#changelist-filter li {
  display: inline-block;
  margin: 0 6px 6px 0;
}
#changelist-filter li a {
  border: 1px solid #d7dbe3;
  border-radius: 12px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
  background: #fff;
  display: inline-block;
  text-decoration: none;
}
#changelist-filter li a:hover {
  border-color: var(--al-blue);
  color: var(--al-blue);
}
#changelist-filter li.selected a {
  background: var(--al-blue);
  border-color: var(--al-blue);
  color: #fff;
}
a.clear-filter {
  font-size: 12px;
  font-weight: 600;
  color: var(--al-blue);
  float: right;
  margin-top: 2px;
  cursor: pointer;
  text-decoration: none;
}

/* Table Card */
.results-card {
  background: #fff;
  border-top: 3px solid var(--primary);
  box-shadow: 0 1px 1px rgba(0,0,0,.1);
}
.results-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
}
.results-card-header .title-with-icon {
  font-size: 17px;
  font-weight: 600;
  color: #444;
}

/* Search Box */
#custom-search-container {
  border: 1px solid var(--line);
  padding: 5px 9px;
  background: #fff;
  display: flex;
  align-items: center;
}
#custom-search-container i {
  color: #9aa2ae;
  margin-right: 6px;
}
#custom-search-container input {
  border: none;
  font-size: 13px;
  outline: none;
  width: 200px;
}

/* Table Overrides */
#changelist table {
  width: 100%;
  border-collapse: collapse;
}
#changelist table thead th {
  padding: 8px 10px;
  border-bottom: 2px solid var(--line);
  font-size: 13px;
  font-weight: 600;
  color: #444;
  text-align: left;
  text-transform: none;
}
#changelist table tbody tr {
  border-top: 1px solid var(--line-soft);
  cursor: pointer;
  background: #fff;
}
#changelist table tbody tr:hover {
  background: #f5f7fa;
}
#changelist table tbody td {
  padding: 6px 10px;
  vertical-align: top;
}
#changelist table thead th.column-id_mono { width: 60px; }
#changelist table thead th.column-name_slug { width: auto; }
#changelist table thead th.column-tests_count { width: 82px; }
#changelist table thead th.column-frequency_chips { width: 108px; }
#changelist table thead th.column-units_count { width: 72px; }
#changelist table thead th.column-modified_info { width: 140px; }
#changelist table thead th.column-edit_link { width: 40px; text-align: center; }
#changelist table tbody td.field-edit_link { text-align: center; }

/* Buttons */
.btn-primary, .btn-default {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 3px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary {
  background: var(--primary);
  border: 1px solid var(--primary-2);
  color: #fff !important;
}
.btn-primary:hover {
  background: var(--primary-2);
}
.btn-default {
  background: #f4f4f4;
  border: 1px solid #ddd;
  color: #444 !important;
  box-shadow: 2px 2px 2px #ddd;
}
.btn-default:hover {
  background: #e4e4e4;
}

.object-tools .addlink {
  background: var(--primary) !important;
  border: 1px solid var(--primary-2) !important;
  color: #fff !important;
  border-radius: 3px;
  padding: 6px 12px;
  font-weight: 600;
  background-image: none !important;
  box-shadow: none;
}
.object-tools .addlink:hover {
  background: var(--primary-2) !important;
}

/* Header Title */
h1 {
  font-size: 22px;
  font-weight: 400;
  color: #444;
}
h1 .small-counter {
  font-size: 14px;
  color: #999;
  margin-left: 8px;
}

/* --- Change Form (Details) --- */
.details-card {
  background: #fff;
  border-top: 3px solid var(--primary);
  box-shadow: 0 1px 1px rgba(0,0,0,.1);
  margin-bottom: 20px;
  border-radius: 0;
}
.details-card-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 17px;
  font-weight: 600;
  color: #444;
}
.details-card-header .id-display {
  font-size: 13px;
  color: var(--muted);
  font-weight: normal;
  float: right;
}
.details-card-body {
  padding: 12px;
}
.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 16px;
}
.details-grid .field-row {
  display: flex;
  flex-direction: column;
}
.details-grid .field-row.full-width {
  grid-column: 1 / -1;
}

.details-grid label {
  font-size: 13px;
  font-weight: 600;
  color: #555;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
}
.details-grid label .required {
  color: var(--al-red);
  margin-left: 2px;
}
.details-grid .hint {
  font-size: 11px;
  font-weight: 600;
  color: #8a929e;
  margin-left: 6px;
}
.details-grid .hint.warn {
  color: var(--warn-hint);
}
.details-grid input[type="text"],
.details-grid textarea,
.details-grid .ace_editor {
  font-size: 14px;
  color: #555;
  border: 1px solid var(--line);
  border-radius: 0;
  box-shadow: 2px 2px 2px #ddd;
  padding: 6px 10px;
  min-height: 34px;
  width: 100%;
  box-sizing: border-box;
}
.details-grid input[type="text"]:focus,
.details-grid textarea:focus {
  border-color: var(--al-blue);
  outline: none;
}
.details-grid textarea {
  resize: vertical;
}
.details-grid .mono-font {
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size: 13px;
}

/* Description Preview Toggle */
.desc-toggle {
  margin-left: auto;
  border: 1px solid #cfd5df;
  border-radius: 3px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  color: #6b7280;
  background: #fff;
  cursor: pointer;
}
.desc-toggle:hover {
  border-color: var(--al-blue);
  color: var(--al-blue);
}
.desc-preview-box {
  min-height: 60px;
  border: 1px solid var(--line);
  box-shadow: 2px 2px 2px #ddd;
  padding: 8px 10px;
  background: #fcfcfd;
  font-size: 14px;
  line-height: 1.55;
  display: none;
}
.desc-preview-box p {
  margin: 0 0 8px;
}
.desc-preview-box a {
  color: var(--al-blue);
}
.desc-preview-empty {
  color: #9aa2ae;
  font-style: italic;
}

/* Error styling */
.details-grid .errorlist {
  color: var(--al-red);
  margin-bottom: 4px;
  padding: 0;
  list-style: none;
  font-size: 12px;
  font-weight: 600;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    
    // --- 1. Details Panel (Change Form) ---
    const detailsRoot = document.getElementById('testlist-builder-details-root');
    if (detailsRoot) {
        // Construct the Details card HTML
        detailsRoot.innerHTML = `
            <div class="details-card">
                <div class="details-card-header">
                    <i class="fa fa-info-circle"></i> Details
                    <span class="id-display" id="builder-id-display"></span>
                </div>
                <div class="details-card-body">
                    <div class="details-grid" id="builder-details-grid">
                        <div class="field-row" id="row-name"></div>
                        <div class="field-row" id="row-slug"></div>
                        <div class="field-row full-width" id="row-description"></div>
                        <div class="field-row full-width" id="row-warning"></div>
                        <div class="field-row full-width" id="row-javascript"></div>
                    </div>
                </div>
            </div>
        `;

        const originalFieldset = document.querySelector('fieldset.module');
        
        function moveField(srcClass, targetId, showHint=false, hintText='', warn=false, mono=false) {
            const srcRow = document.querySelector(`.form-row.field-${srcClass}`);
            if (!srcRow) return;
            
            const target = document.getElementById(targetId);
            if (!target) return;

            const label = srcRow.querySelector('label');
            if (label) {
                const newLabel = label.cloneNode(true);
                if (showHint) {
                    const hint = document.createElement('span');
                    hint.className = warn ? 'hint warn' : 'hint';
                    hint.innerHTML = hintText;
                    newLabel.appendChild(hint);
                }
                target.appendChild(newLabel);
            }

            const errors = srcRow.querySelector('.errorlist');
            if (errors) {
                target.appendChild(errors);
            }

            // Move the input/editor
            const inputContainer = srcRow.querySelector('div');
            if (inputContainer) {
                Array.from(inputContainer.childNodes).forEach(node => {
                    if (node.nodeName !== 'LABEL' && node.className !== 'help' && node.className !== 'errorlist') {
                        target.appendChild(node);
                    }
                });
            }

            const input = target.querySelector('input, textarea');
            if (input && mono) {
                input.classList.add('mono-font');
            }
        }

        // Set ID
        const idRow = document.querySelector('.form-row.field-id .readonly');
        if (idRow) {
            document.getElementById('builder-id-display').textContent = 'ID: ' + idRow.textContent;
        }

        // Move fields
        moveField('name', 'row-name');
        moveField('slug', 'row-slug', false, '', false, true);
        moveField('description', 'row-description', true, '‹/› HTML markup allowed');
        moveField('warning_message', 'row-warning', true, '<i class="fa fa-exclamation-triangle"></i> shown on failure', true);
        moveField('javascript', 'row-javascript', true, '<i class="fa fa-code"></i> runs on the perform page', false, true);

        // Hide original fieldset
        if (originalFieldset) {
            originalFieldset.style.display = 'none';
        }

        // Description Preview Toggle
        const descRow = document.getElementById('row-description');
        if (descRow) {
            const label = descRow.querySelector('label');
            if (label) {
                const toggleBtn = document.createElement('button');
                toggleBtn.type = 'button';
                toggleBtn.className = 'desc-toggle';
                toggleBtn.innerHTML = '<i class="fa fa-eye"></i> Preview';
                label.appendChild(toggleBtn);
                
                const previewBox = document.createElement('div');
                previewBox.className = 'desc-preview-box';
                descRow.appendChild(previewBox);
                
                const textarea = descRow.querySelector('textarea');
                let isPreview = false;
                
                toggleBtn.addEventListener('click', function() {
                    isPreview = !isPreview;
                    if (!textarea) return;
                    
                    // qatrack+ admin_description_editor.js wraps the textarea or uses it directly
                    // we find the immediate wrapper or just hide the textarea
                    const toHide = textarea.closest('.django-admin-description-editor') || 
                                   document.getElementById('id_description_editor_wrapper') || 
                                   textarea;
                                   
                    if (isPreview) {
                        toggleBtn.innerHTML = '<i class="fa fa-pencil"></i> Edit';
                        toHide.style.display = 'none';
                        previewBox.style.display = 'block';
                        
                        const val = textarea.value.trim();
                        if (val) {
                            previewBox.innerHTML = val;
                        } else {
                            previewBox.innerHTML = '<span class="desc-preview-empty">Nothing to preview — write a description to see how the markup renders.</span>';
                        }
                    } else {
                        toggleBtn.innerHTML = '<i class="fa fa-eye"></i> Preview';
                        toHide.style.display = '';
                        previewBox.style.display = 'none';
                    }
                });
            }
        }
    }

    // --- 2. Changelist (Index) ---
    const changelist = document.getElementById('changelist');
    if (changelist) {
        // Search Box Move
        const searchForm = document.getElementById('changelist-search');
        const searchTarget = document.getElementById('custom-search-container');
        if (searchForm && searchTarget) {
            const input = searchForm.querySelector('input[type="text"]');
            if (input) {
                input.placeholder = "Search name, slug or tags…";
            }
            const icon = document.createElement('i');
            icon.className = 'fa fa-search';
            searchTarget.appendChild(icon);
            searchTarget.appendChild(searchForm);
            
            const toolbar = document.getElementById('toolbar');
            if (toolbar) toolbar.style.display = 'none';
        }

        // Row Clicks
        const rows = document.querySelectorAll('#changelist table tbody tr');
        rows.forEach(row => {
            row.addEventListener('click', function(e) {
                if (e.target.tagName === 'A' || e.target.tagName === 'INPUT' || e.target.closest('a')) {
                    return;
                }
                const editLink = row.querySelector('.field-edit_link a');
                if (editLink) {
                    window.location.href = editLink.href;
                }
            });
        });

        // Filter Sidebar Tweaks
        const filterTitle = document.querySelector('#changelist-filter h2');
        if (filterTitle) {
            // Check if any filter is active (url has query params other than sort/p)
            // Simplified: if there's any querystring, just show clear.
            if (window.location.search.length > 1) {
                const clearBtn = document.createElement('a');
                clearBtn.href = '?';
                clearBtn.className = 'clear-filter';
                clearBtn.textContent = 'Clear';
                filterTitle.appendChild(clearBtn);
            }
        }
        
        // Hide 'All' chips unless they are the active one or the first one?
        // Requirements say: "Hide the "All" chip except render it as the first chip labelled "All""
        // Django already puts "All" as the first <li> in each <ul>
        // We just leave it, the CSS styles all <li>s as chips.
    }
});
</script>
